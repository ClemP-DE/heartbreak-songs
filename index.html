<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Heartbreak Songs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Newsreader:ital,opsz@0,6..72;1,6..72&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0e0f14; --ink2:#15171f; --line:#2a2d3a;
    --paper:#e9e4d8; --muted:#8b8a93; --amber:#d99a4e; --amber-dim:#9a7038;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1200px 600px at 70% -10%, rgba(217,154,78,.06), transparent 60%),
      var(--ink);
    color:var(--paper);
    font-family:"Newsreader",Georgia,serif; font-size:18px; line-height:1.55;
    min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:56px 24px 96px;animation:rise .7s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  header{border-bottom:1px solid var(--line);padding-bottom:28px;margin-bottom:8px}
  .kicker{font-style:italic;color:var(--amber);font-size:.95rem;margin:0 0 10px}
  h1{font-family:"Fraunces";font-weight:600;font-size:clamp(2.4rem,7vw,3.6rem);line-height:1.02;margin:0;letter-spacing:-.01em}
  .sub{color:var(--muted);margin:14px 0 0;max-width:48ch}
  form{margin:34px 0 10px;display:grid;gap:14px}
  .row{display:grid;gap:14px;grid-template-columns:1fr 1fr}
  @media(max-width:560px){.row{grid-template-columns:1fr}}
  .lab{font-family:"Fraunces";font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block}
  input{width:100%;background:var(--ink2);border:1px solid var(--line);color:var(--paper);
    font-family:"Newsreader",serif;font-size:1.05rem;padding:12px 14px;border-radius:2px;outline:none;
    transition:border-color .2s,box-shadow .2s}
  input:focus{border-color:var(--amber-dim);box-shadow:0 0 0 3px rgba(217,154,78,.12)}
  input::placeholder{color:#55565f}
  button{justify-self:start;margin-top:4px;cursor:pointer;background:transparent;color:var(--amber);
    border:1px solid var(--amber-dim);padding:11px 22px;border-radius:2px;
    font-family:"Fraunces";font-size:.95rem;letter-spacing:.04em;transition:background .2s,color .2s}
  button:hover{background:var(--amber);color:var(--ink)}
  button:disabled{opacity:.5;cursor:default}
  .note{min-height:1.2em;font-style:italic;color:var(--muted);font-size:.95rem}
  .count{font-family:"Fraunces";font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:48px 0 4px}
  ul{list-style:none;margin:0;padding:0}
  li{padding:20px 0;border-bottom:1px solid var(--line);display:flex;gap:18px;align-items:baseline}
  li .n{font-family:"Fraunces";color:var(--amber-dim);font-size:.95rem;min-width:2.2ch;text-align:right}
  .song{font-family:"Fraunces";font-weight:500;font-size:1.18rem}
  a.song{color:var(--paper);text-decoration:none;border-bottom:1px solid var(--amber-dim);transition:color .2s,border-color .2s}
  a.song:hover{color:var(--amber);border-color:var(--amber)}
  .by{color:var(--muted)}
  .who{display:block;color:var(--muted);font-style:italic;font-size:.95rem;margin-top:3px}
  .empty{color:var(--muted);font-style:italic;padding:24px 0}
</style>

<div class="wrap">
  <header>
    <p class="kicker">a small shared collection</p>
    <h1>Heartbreak Songs</h1>
    <p class="sub">Add the one song that breaks you every time.</p>
  </header>

  <form id="f">
    <label><span class="lab">Your name</span>
      <input id="name" maxlength="60" placeholder="Who's adding this" autocomplete="off"></label>
    <div class="row">
      <label><span class="lab">Song title</span>
        <input id="title" maxlength="120" placeholder="The song" autocomplete="off"></label>
      <label><span class="lab">Performer</span>
        <input id="performer" maxlength="120" placeholder="Who performs it" autocomplete="off"></label>
    </div>
    <label><span class="lab">Link <span style="text-transform:none;letter-spacing:0">(optional — YouTube, Spotify, anywhere)</span></span>
      <input id="url" type="url" maxlength="500" placeholder="https://…" autocomplete="off"></label>
    <button id="submit" type="submit">Add a song</button>
    <p class="note" id="note"></p>
  </form>

  <p class="count" id="count">Loading…</p>
  <ul id="list"></ul>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const safeHref = u => (u && /^https?:\/\//i.test(u)) ? u : null;

function render(rows){
  $("count").textContent = rows.length
    ? rows.length + (rows.length === 1 ? " song" : " songs") + " so far"
    : "Nothing here yet";
  const list = $("list");
  if(!rows.length){ list.innerHTML = '<li class="empty">Be the first to add one.</li>'; return; }
  list.innerHTML = rows.map((e,i) => {
    const href = safeHref(e.url);
    const song = href
      ? `<a class="song" href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(e.title)}</a>`
      : `<span class="song">${esc(e.title)}</span>`;
    return `
    <li>
      <span class="n">${rows.length - i}</span>
      <span>
        ${song} <span class="by">— ${esc(e.performer)}</span>
        <span class="who">added by ${esc(e.name)}</span>
      </span>
    </li>`;
  }).join("");
}

async function load(){
  try{
    const r = await fetch("/api/songs");
    if(!r.ok) throw 0;
    render(await r.json());
  }catch{ $("count").textContent = "Couldn't reach the database."; }
}

$("f").addEventListener("submit", async ev => {
  ev.preventDefault();
  const name = $("name").value.trim(), title = $("title").value.trim(), performer = $("performer").value.trim();
  const url = $("url").value.trim();
  if(!name || !title || !performer){ $("note").textContent = "Fill in name, title, and performer."; return; }

  $("submit").disabled = true; $("note").textContent = "Saving…";
  try{
    const r = await fetch("/api/songs", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ name, title, performer, url })
    });
    if(!r.ok){ const e = await r.json().catch(()=>({})); throw new Error(e.error || "save failed"); }
    $("title").value = ""; $("performer").value = ""; $("url").value = "";
    $("note").textContent = "Added. Thank you.";
    await load();
  }catch(err){ $("note").textContent = err.message || "Couldn't save — try again."; }
  finally{ $("submit").disabled = false; }
});

load();
</script>
