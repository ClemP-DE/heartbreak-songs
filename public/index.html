<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Heartbreak Songs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Newsreader:ital,opsz@0,6..72;1,6..72&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1c2027; --panel:#262b34; --field:#2f3540; --line:#3a414e;
    --border:#4b5462; --paper:#ece8de; --muted:#b6bcc7; --soft:#8b92a0;
    --amber:#e2a65c; --amber-dim:#b07e3c;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1100px 560px at 72% -8%, rgba(226,166,92,.08), transparent 60%),
      var(--bg);
    color:var(--paper);
    font-family:"Newsreader",Georgia,serif; font-size:18px; line-height:1.55;
    min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:820px;margin:0 auto;padding:52px 24px 96px;animation:rise .6s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  header{border-bottom:1px solid var(--line);padding-bottom:26px;margin-bottom:22px}
  .kicker{font-style:italic;color:var(--amber);font-size:.95rem;margin:0 0 10px}
  h1{font-family:"Fraunces";font-weight:600;font-size:clamp(2.3rem,7vw,3.5rem);line-height:1.02;margin:0;letter-spacing:-.01em}
  .sub{color:var(--muted);margin:13px 0 0;max-width:54ch}

  .lab{font-family:"Fraunces";font-size:.84rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block}
  .lab .opt{text-transform:none;letter-spacing:0;color:var(--soft);font-size:.92em}

  .btn{cursor:pointer;background:var(--amber);color:#1a1410;border:1px solid var(--amber);
    padding:11px 22px;border-radius:3px;font-family:"Fraunces";font-size:.98rem;letter-spacing:.02em;transition:filter .2s}
  .btn:hover{filter:brightness(1.08)}
  .btn:disabled{opacity:.5;cursor:default}

  .bar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:14px}
  .count{font-family:"Fraunces";font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);margin:0}

  table.songs{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  table.songs thead th{font-family:"Fraunces";text-align:left;font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);padding:13px 16px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.02)}
  table.songs td{padding:13px 16px;border-bottom:1px solid var(--line);vertical-align:top}
  tr.srow{cursor:pointer;transition:background .15s}
  tr.srow:hover{background:rgba(255,255,255,.035)}
  tr.srow td.t{font-family:"Fraunces";font-weight:500;font-size:1.05rem;color:var(--paper)}
  tr.srow td.a,tr.srow td.w{color:var(--muted)}
  .caret{color:var(--soft);font-size:.78rem;margin-right:9px;display:inline-block;width:.8em}
  tr.detail>td{background:rgba(0,0,0,.18);padding:0 16px}
  .detail-inner{padding:14px 0 18px;max-width:64ch}
  .why{white-space:pre-wrap;color:var(--paper);margin:0 0 10px}
  .why.empty{color:var(--soft);font-style:italic}
  .dlinks{display:flex;gap:20px;flex-wrap:wrap}
  .dlinks a{color:var(--amber);text-decoration:none;border-bottom:1px solid var(--amber-dim);font-size:.95rem}
  .dlinks a:hover{color:#f0bd7a}
  .empty-msg{color:var(--soft);font-style:italic;padding:26px 16px;background:var(--panel);border:1px solid var(--line);border-radius:6px}

  form{display:grid;gap:16px;max-width:640px}
  .namehead{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .anon{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:.92rem;cursor:pointer;font-family:"Newsreader",serif}
  .anon input{width:auto;margin:0;accent-color:var(--amber)}
  .row{display:grid;gap:16px;grid-template-columns:1fr 1fr}
  @media(max-width:560px){.row{grid-template-columns:1fr}}
  input,textarea{width:100%;background:var(--field);border:1px solid var(--border);color:var(--paper);
    font-family:"Newsreader",serif;font-size:1.05rem;padding:12px 14px;border-radius:3px;outline:none;
    transition:border-color .2s,box-shadow .2s}
  textarea{resize:vertical;min-height:90px;line-height:1.5}
  input:focus,textarea:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(226,166,92,.16)}
  input::placeholder,textarea::placeholder{color:#7a818f}
  input.ro{opacity:.7;font-style:italic}
  .backbtn{background:none;border:none;color:var(--soft);cursor:pointer;font-family:"Newsreader",serif;font-size:1rem;padding:0;margin-bottom:18px}
  .backbtn:hover{color:var(--paper)}
  .note{min-height:1.2em;font-style:italic;color:var(--muted);font-size:.95rem;margin:2px 0 0}
</style>

<div class="wrap">
  <header>
    <p class="kicker">a small shared collection</p>
    <h1>Heartbreak Songs</h1>
    <p class="sub">Add a song that you consider a &lsquo;good&rsquo; heartbreak song.</p>
  </header>

  <!-- LIST VIEW -->
  <section id="listView">
    <div class="bar">
      <p class="count" id="count">Loading&hellip;</p>
      <button class="btn" id="showForm">Enter a song</button>
    </div>
    <div id="tableWrap"></div>
  </section>

  <!-- FORM VIEW -->
  <section id="formView" hidden>
    <button class="backbtn" id="backToList">&larr; Back to the list</button>
    <form id="f">
      <div>
        <div class="namehead">
          <span class="lab" style="margin:0">Your name</span>
          <label class="anon"><input type="checkbox" id="anon"> anonymous</label>
        </div>
        <input id="name" maxlength="60" placeholder="Who's adding this" autocomplete="off" style="margin-top:6px">
      </div>
      <div class="row">
        <div><span class="lab">Song title</span>
          <input id="title" maxlength="120" placeholder="The song" autocomplete="off"></div>
        <div><span class="lab">Artist</span>
          <input id="performer" maxlength="120" placeholder="Who performs it" autocomplete="off"></div>
      </div>
      <div><span class="lab">Link to the song <span class="opt">(optional)</span></span>
        <input id="url" type="url" maxlength="500" placeholder="https://&hellip; (YouTube, Spotify, anywhere)" autocomplete="off"></div>
      <div><span class="lab">Link to more information <span class="opt">(optional &mdash; e.g. Wikipedia)</span></span>
        <input id="info_url" type="url" maxlength="500" placeholder="https://&hellip;" autocomplete="off"></div>
      <div><span class="lab">Why do you think it makes a great heartbreak song? <span class="opt">(optional)</span></span>
        <textarea id="comment" maxlength="2000" placeholder="A memory, a lyric, anything&hellip;"></textarea></div>
      <button class="btn" id="submit" type="submit" style="justify-self:start">Add the song</button>
      <p class="note" id="note"></p>
    </form>
  </section>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const safeHref = u => (u && /^https?:\/\//i.test(u)) ? u : null;

function showList(){ $("formView").hidden = true; $("listView").hidden = false; }
function showForm(){ $("listView").hidden = true; $("formView").hidden = false; $("name").focus(); }

function render(rows){
  $("count").textContent = rows.length
    ? rows.length + (rows.length === 1 ? " song" : " songs") + " so far"
    : "No songs yet";
  const wrap = $("tableWrap");
  if(!rows.length){ wrap.innerHTML = '<div class="empty-msg">No songs yet &mdash; be the first to add one.</div>'; return; }

  let html = '<table class="songs"><thead><tr><th>Song title</th><th>Artist</th><th>Entered by</th></tr></thead><tbody>';
  rows.forEach((e,i) => {
    const songHref = safeHref(e.url);
    const infoHref = safeHref(e.info_url);
    const links = [];
    if(songHref) links.push('<a href="'+esc(songHref)+'" target="_blank" rel="noopener noreferrer">Listen \u2197</a>');
    if(infoHref) links.push('<a href="'+esc(infoHref)+'" target="_blank" rel="noopener noreferrer">More about it \u2197</a>');
    const why = e.comment ? '<p class="why">'+esc(e.comment)+'</p>' : '<p class="why empty">No note added.</p>';
    html +=
      '<tr class="srow" data-i="'+i+'">'+
        '<td class="t"><span class="caret" id="c'+i+'">\u25b8</span>'+esc(e.title)+'</td>'+
        '<td class="a">'+esc(e.performer)+'</td>'+
        '<td class="w">'+esc(e.name)+'</td>'+
      '</tr>'+
      '<tr class="detail" id="d'+i+'" hidden>'+
        '<td colspan="3"><div class="detail-inner">'+why+(links.length ? '<div class="dlinks">'+links.join("")+'</div>' : "")+'</div></td>'+
      '</tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;

  wrap.querySelectorAll("tr.srow").forEach(tr => {
    tr.addEventListener("click", () => {
      const i = tr.getAttribute("data-i");
      const d = $("d"+i), c = $("c"+i);
      d.hidden = !d.hidden;
      c.textContent = d.hidden ? "\u25b8" : "\u25be";
    });
  });
}

async function load(){
  try{
    const r = await fetch("/api/songs");
    if(!r.ok) throw 0;
    render(await r.json());
  }catch{ $("count").textContent = "Couldn't reach the database."; }
}

$("showForm").addEventListener("click", showForm);
$("backToList").addEventListener("click", showList);

$("anon").addEventListener("change", () => {
  if($("anon").checked){ $("name").value = "anonymous"; $("name").readOnly = true; $("name").classList.add("ro"); }
  else { $("name").value = ""; $("name").readOnly = false; $("name").classList.remove("ro"); $("name").focus(); }
});

$("f").addEventListener("submit", async ev => {
  ev.preventDefault();
  const name = $("name").value.trim(), title = $("title").value.trim(), performer = $("performer").value.trim();
  const url = $("url").value.trim(), info_url = $("info_url").value.trim(), comment = $("comment").value.trim();
  if(!name || !title || !performer){ $("note").textContent = "Fill in name, title, and artist."; return; }

  $("submit").disabled = true; $("note").textContent = "Saving\u2026";
  try{
    const r = await fetch("/api/songs", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ name, title, performer, url, info_url, comment })
    });
    if(!r.ok){ const e = await r.json().catch(()=>({})); throw new Error(e.error || "save failed"); }
    $("f").reset(); $("name").readOnly = false; $("name").classList.remove("ro");
    $("note").textContent = "";
    await load();
    showList();
  }catch(err){ $("note").textContent = err.message || "Couldn't save \u2014 try again."; }
  finally{ $("submit").disabled = false; }
});

load();
</script>
